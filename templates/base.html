<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elitestay Hotel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="container nav">
      <div class="brand">Elitestay Hotel</div>
      <nav class="nav-links">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('rooms') }}">Rooms</a>
        <a href="{{ url_for('booking') }}">Booking</a>
        <a href="{{ url_for('admin_login') }}">Admin</a>
      </nav>
    </div>
  </header>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="container flash-box">
        {% for message in messages %}
          <p class="flash-message">{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

  <footer>
    <div class="container">
      © 2026 Elitestay Hotel — Secure, comfortable, and convenient booking.
    </div>
  </footer>
</body>
</html>
